<svg width="1600" height="1600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1600">
  <defs>
	<filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
	  <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.5"/>
	</filter>

	<filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
	  <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.3"/>
	</filter>

	<radialGradient id="fairyGlow" cx="50%" cy="50%" r="50%">
	  <stop offset="0%" style="stop-color:#ffff99;stop-opacity:0.9" />
	  <stop offset="40%" style="stop-color:#ffd700;stop-opacity:0.6" />
	  <stop offset="100%" style="stop-color:#d4af37;stop-opacity:0" />
	</radialGradient>

	<radialGradient id="stoneGradient1" cx="40%" cy="40%">
	  <stop offset="0%" style="stop-color:#6a7d8a;stop-opacity:1" />
	  <stop offset="50%" style="stop-color:#5a6d7a;stop-opacity:0.9" />
	  <stop offset="100%" style="stop-color:#3a4d5a;stop-opacity:0.8" />
	</radialGradient>

	<radialGradient id="stoneGradient2" cx="45%" cy="45%">
	  <stop offset="0%" style="stop-color:#7a8d9a;stop-opacity:1" />
	  <stop offset="50%" style="stop-color:#6a7d8a;stop-opacity:0.9" />
	  <stop offset="100%" style="stop-color:#4a5d6a;stop-opacity:0.8" />
	</radialGradient>

	<linearGradient id="grassGradient" x1="0%" y1="0%" x2="0%" y2="100%">
	  <stop offset="0%" style="stop-color:#6b8e6b;stop-opacity:0.8" />
	  <stop offset="50%" style="stop-color:#5a7d5a;stop-opacity:0.7" />
	  <stop offset="100%" style="stop-color:#4a6d4a;stop-opacity:0.6" />
	</linearGradient>

	<!-- Fairy flight path animations -->
	<style>
	  @keyframes fairyFlight1 {
		0% { transform: translate(0, 0) rotate(0deg); }
		10% { transform: translate(40px, -30px) rotate(2deg); }
		25% { transform: translate(100px, -70px) rotate(4deg); }
		40% { transform: translate(160px, -40px) rotate(2deg); }
		50% { transform: translate(200px, 0) rotate(0deg); }
		60% { transform: translate(180px, 40px) rotate(-2deg); }
		75% { transform: translate(120px, 80px) rotate(-4deg); }
		88% { transform: translate(50px, 40px) rotate(-2deg); }
		100% { transform: translate(0, 0) rotate(0deg); }
	  }
	  @keyframes fairyFlight2 {
		0% { transform: translate(0, 0) rotate(0deg); }
		12% { transform: translate(-35px, -50px) rotate(-2deg); }
		25% { transform: translate(-80px, -110px) rotate(-4deg); }
		38% { transform: translate(-140px, -70px) rotate(-2deg); }
		50% { transform: translate(-180px, 0) rotate(0deg); }
		62% { transform: translate(-155px, 60px) rotate(2deg); }
		75% { transform: translate(-100px, 120px) rotate(4deg); }
		87% { transform: translate(-40px, 65px) rotate(2deg); }
		100% { transform: translate(0, 0) rotate(0deg); }
	  }
	  @keyframes fairyFlight3 {
		0% { transform: translate(0, 0) rotate(0deg); }
		12% { transform: translate(30px, 40px) rotate(2deg); }
		25% { transform: translate(80px, 100px) rotate(3deg); }
		37% { transform: translate(120px, 40px) rotate(1deg); }
		50% { transform: translate(150px, -80px) rotate(-2deg); }
		62% { transform: translate(110px, -130px) rotate(-3deg); }
		75% { transform: translate(60px, -150px) rotate(-2deg); }
		87% { transform: translate(20px, -80px) rotate(-1deg); }
		100% { transform: translate(0, 0) rotate(0deg); }
	  }
	  @keyframes fairyFlight4 {
		0% { transform: translate(0, 0) rotate(0deg); }
		12% { transform: translate(-50px, 35px) rotate(-2deg); }
		25% { transform: translate(-120px, 90px) rotate(-3deg); }
		37% { transform: translate(-150px, 10px) rotate(-1deg); }
		50% { transform: translate(-150px, -100px) rotate(2deg); }
		62% { transform: translate(-50px, -130px) rotate(3deg); }
		75% { transform: translate(100px, -120px) rotate(2deg); }
		87% { transform: translate(70px, -50px) rotate(1deg); }
		100% { transform: translate(0, 0) rotate(0deg); }
	  }
	  @keyframes wingFlap {
		0% { opacity: 0.35; transform: scaleY(1); }
		25% { opacity: 0.25; transform: scaleY(0.85); }
		50% { opacity: 0.15; transform: scaleY(0.7); }
		75% { opacity: 0.25; transform: scaleY(0.85); }
		100% { opacity: 0.35; transform: scaleY(1); }
	  }
	  @keyframes glowPulse {
		0% { opacity: 0.7; transform: scale(1); }
		25% { opacity: 0.85; transform: scale(1.03); }
		50% { opacity: 1; transform: scale(1.06); }
		75% { opacity: 0.85; transform: scale(1.03); }
		100% { opacity: 0.7; transform: scale(1); }
	  }
	  .fairy1, .fairy2, .fairy3, .fairy4, .wings, .glow {
		transform-box: fill-box;
		transform-origin: center;
	  }
	  .fairy1 { animation: fairyFlight1 8s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite; }
	  .fairy2 { animation: fairyFlight2 9s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite; }
	  .fairy3 { animation: fairyFlight3 10s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite; }
	  .fairy4 { animation: fairyFlight4 11s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite; }
	  .wings { animation: wingFlap 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite; }
	  .glow { animation: glowPulse 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite; }
	</style>
  </defs>

  <!-- Base ground -->
  <rect width="1600" height="1600" fill="#0a1810"/>

  <!-- Far background sky fade -->
  <rect width="1600" height="600" fill="#1a3025" opacity="0.3"/>

  <!-- Large background stones (far back) -->
  <ellipse cx="250" cy="1350" rx="180" ry="80" fill="url(#stoneGradient1)" opacity="0.5"/>
  <ellipse cx="1350" cy="1380" rx="200" ry="90" fill="url(#stoneGradient2)" opacity="0.45"/>
  <ellipse cx="800" cy="1450" rx="250" ry="100" fill="url(#stoneGradient1)" opacity="0.4"/>

  <!-- Mid-size stones with detail -->
  <ellipse cx="400" cy="1280" rx="120" ry="50" fill="url(#stoneGradient2)" opacity="0.7" filter="url(#shadow)"/>
  <ellipse cx="1200" cy="1300" rx="140" ry="55" fill="url(#stoneGradient1)" opacity="0.75" filter="url(#shadow)"/>

  <!-- Stone texture details -->
  <path d="M 280 1370 Q 320 1380 360 1375" stroke="#1a2a22" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 1350 1400 Q 1400 1420 1450 1410" stroke="#1a2a22" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M 750 1480 L 850 1500 L 900 1490" stroke="#1a2a22" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Foreground detailed stones -->
  <g filter="url(#shadow)">
	<ellipse cx="150" cy="1400" rx="90" ry="35" fill="url(#stoneGradient1)"/>
	<path d="M 90 1410 Q 130 1435 170 1425" stroke="#0a1810" stroke-width="2" fill="none" opacity="0.7"/>
	<circle cx="130" cy="1395" r="8" fill="#1a2a22" opacity="0.4"/>
	<circle cx="170" cy="1408" r="6" fill="#1a2a22" opacity="0.3"/>
  </g>

  <g filter="url(#shadow)">
	<ellipse cx="1450" cy="1420" rx="100" ry="40" fill="url(#stoneGradient2)"/>
	<path d="M 1380 1430 Q 1430 1460 1520 1450" stroke="#0a1810" stroke-width="2" fill="none" opacity="0.7"/>
	<circle cx="1420" cy="1410" r="9" fill="#1a2a22" opacity="0.4"/>
	<circle cx="1480" cy="1428" r="7" fill="#1a2a22" opacity="0.3"/>
  </g>

  <!-- Detailed grass tufts - Left cluster -->
  <g opacity="0.85" filter="url(#softShadow)">
	<path d="M 80 1400 L 72 1320 M 110 1410 L 105 1330 M 140 1405 L 135 1340 M 170 1415 L 162 1325" 
		  stroke="#7a9e7a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
	<path d="M 60 1410 L 50 1360 M 130 1420 L 120 1350 M 190 1415 L 180 1360" 
		  stroke="#8aae8a" stroke-width="3" stroke-linecap="round"/>
	<path d="M 95 1418 L 90 1380 M 155 1418 L 148 1375" 
		  stroke="#6b8e6b" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Detailed grass tufts - Center cluster -->
  <g opacity="0.85" filter="url(#softShadow)">
	<path d="M 720 1480 L 710 1380 M 760 1490 L 755 1390 M 800 1495 L 795 1385 M 840 1490 L 835 1395 M 880 1485 L 875 1400" 
		  stroke="#7a9e7a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
	<path d="M 700 1495 L 688 1420 M 740 1500 L 728 1410 M 800 1505 L 788 1400 M 860 1500 L 848 1415 M 900 1495 L 888 1425" 
		  stroke="#8aae8a" stroke-width="3" stroke-linecap="round"/>
	<path d="M 730 1500 L 722 1450 M 770 1500 L 762 1440 M 810 1500 L 802 1435 M 850 1500 L 842 1445" 
		  stroke="#6b8e6b" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Detailed grass tufts - Right cluster -->
  <g opacity="0.85" filter="url(#softShadow)">
	<path d="M 1420 1430 L 1410 1340 M 1460 1440 L 1452 1350 M 1500 1445 L 1490 1345 M 1540 1440 L 1530 1355" 
		  stroke="#7a9e7a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
	<path d="M 1400 1445 L 1388 1380 M 1480 1450 L 1468 1370 M 1560 1445 L 1548 1380" 
		  stroke="#8aae8a" stroke-width="3" stroke-linecap="round"/>
	<path d="M 1440 1448 L 1432 1410 M 1520 1448 L 1512 1405" 
		  stroke="#6b8e6b" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Scattered grass throughout field -->
  <g opacity="0.7" filter="url(#softShadow)">
	<path d="M 300 1360 L 292 1280 M 330 1365 L 325 1290" stroke="#5a7d5a" stroke-width="3" stroke-linecap="round"/>
	<path d="M 600 1400 L 592 1310 M 630 1405 L 623 1315" stroke="#5a7d5a" stroke-width="3" stroke-linecap="round"/>
	<path d="M 1000 1420 L 992 1330 M 1030 1425 L 1023 1335" stroke="#5a7d5a" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Moss and stone patches -->
  <g opacity="0.4">
	<circle cx="200" cy="1380" r="25" fill="#5a7d5a"/>
	<circle cx="1350" cy="1400" r="30" fill="#5a7d5a"/>
	<ellipse cx="800" cy="1460" rx="40" ry="20" fill="#5a7d5a"/>
  </g>

  <!-- Detailed Mushrooms with variation -->
  <!-- Mushroom 1 - Large, Left side -->
  <g filter="url(#shadow)">
	<!-- Stem -->
	<ellipse cx="280" cy="1340" rx="20" ry="45" fill="#9b7f5a"/>
	<ellipse cx="280" cy="1340" rx="18" ry="43" fill="#ab8f6a" opacity="0.6"/>
	<!-- Cap -->
	<ellipse cx="280" cy="1290" rx="50" ry="28" fill="#e8956a"/>
	<ellipse cx="280" cy="1280" rx="48" ry="25" fill="#f0a57a" opacity="0.7"/>
	<!-- Spots -->
	<circle cx="260" cy="1285" r="5" fill="#d87d5e"/>
	<circle cx="300" cy="1283" r="5" fill="#d87d5e"/>
	<circle cx="280" cy="1270" r="4" fill="#d87d5e"/>
	<circle cx="250" cy="1295" r="3.5" fill="#c46b4f" opacity="0.7"/>
	<circle cx="310" cy="1295" r="3.5" fill="#c46b4f" opacity="0.7"/>
  </g>

  <!-- Mushroom 2 - Medium, Center -->
  <g filter="url(#shadow)">
	<!-- Stem -->
	<ellipse cx="800" cy="1380" rx="16" ry="38" fill="#9b7f5a"/>
	<ellipse cx="800" cy="1380" rx="14" ry="36" fill="#ab8f6a" opacity="0.6"/>
	<!-- Cap -->
	<ellipse cx="800" cy="1335" rx="40" ry="22" fill="#e8956a"/>
	<ellipse cx="800" cy="1328" rx="38" ry="20" fill="#f0a57a" opacity="0.7"/>
	<!-- Spots -->
	<circle cx="785" cy="1332" r="4" fill="#d87d5e"/>
	<circle cx="815" cy="1330" r="4" fill="#d87d5e"/>
	<circle cx="800" cy="1320" r="3" fill="#d87d5e"/>
	<circle cx="770" cy="1340" r="2.5" fill="#c46b4f" opacity="0.7"/>
	<circle cx="830" cy="1340" r="2.5" fill="#c46b4f" opacity="0.7"/>
  </g>

  <!-- Mushroom 3 - Small, Right side -->
  <g filter="url(#shadow)">
	<!-- Stem -->
	<ellipse cx="1380" cy="1360" rx="14" ry="32" fill="#9b7f5a"/>
	<ellipse cx="1380" cy="1360" rx="12" ry="30" fill="#ab8f6a" opacity="0.6"/>
	<!-- Cap -->
	<ellipse cx="1380" cy="1320" rx="35" ry="20" fill="#e8956a"/>
	<ellipse cx="1380" cy="1314" rx="33" ry="18" fill="#f0a57a" opacity="0.7"/>
	<!-- Spots -->
	<circle cx="1365" cy="1317" r="3.5" fill="#d87d5e"/>
	<circle cx="1395" cy="1316" r="3.5" fill="#d87d5e"/>
	<circle cx="1380" cy="1308" r="2.5" fill="#d87d5e"/>
  </g>

  <!-- Additional small mushrooms scattered -->
  <g filter="url(#softShadow)">
	<ellipse cx="500" cy="1400" rx="10" ry="22" fill="#9b7f5a"/>
	<ellipse cx="500" cy="1375" rx="25" ry="15" fill="#e8956a"/>
	<circle cx="495" cy="1378" r="2" fill="#d87d5e"/>
  </g>

  <g filter="url(#softShadow)">
	<ellipse cx="1100" cy="1410" rx="9" ry="20" fill="#9b7f5a"/>
	<ellipse cx="1100" cy="1388" rx="23" ry="14" fill="#e8956a"/>
	<circle cx="1095" cy="1390" r="1.8" fill="#d87d5e"/>
  </g>

  <!-- Detailed Fantasy Flowers -->
  <!-- Flower 1 - Purple, Large -->
  <g filter="url(#shadow)">
	<line x1="420" y1="1480" x2="420" y2="1330" stroke="#5a7d5a" stroke-width="3"/>
	<!-- Petal sepals -->
	<circle cx="420" cy="1310" r="14" fill="#6b4fa6"/>
	<!-- Main petals -->
	<circle cx="405" cy="1320" r="11" fill="#8b6fd4"/>
	<circle cx="435" cy="1320" r="11" fill="#8b6fd4"/>
	<circle cx="405" cy="1300" r="11" fill="#7b5fb6"/>
	<circle cx="435" cy="1300" r="11" fill="#7b5fb6"/>
	<circle cx="420" cy="1288" r="9" fill="#9b7fde"/>
	<!-- Center stamen -->
	<circle cx="420" cy="1305" r="6" fill="#ffd700"/>
	<circle cx="417" cy="1302" r="2" fill="#ffeb3b" opacity="0.8"/>
  </g>

  <!-- Flower 2 - Pink, Large -->
  <g filter="url(#shadow)">
	<line x1="1050" y1="1490" x2="1050" y2="1340" stroke="#5a7d5a" stroke-width="3"/>
	<!-- Petal sepals -->
	<circle cx="1050" cy="1320" r="13" fill="#c97daf"/>
	<!-- Main petals -->
	<circle cx="1035" cy="1330" r="10" fill="#e8a8d4"/>
	<circle cx="1065" cy="1330" r="10" fill="#e8a8d4"/>
	<circle cx="1035" cy="1310" r="10" fill="#d99bc5"/>
	<circle cx="1065" cy="1310" r="10" fill="#d99bc5"/>
	<circle cx="1050" cy="1298" r="8" fill="#f0b8de"/>
	<!-- Center stamen -->
	<circle cx="1050" cy="1315" r="5.5" fill="#ffd700"/>
	<circle cx="1047" cy="1312" r="1.5" fill="#ffeb3b" opacity="0.8"/>
  </g>

  <!-- Flower 3 - Blue Fantasy, Medium -->
  <g filter="url(#shadow)">
	<line x1="650" y1="1480" x2="650" y2="1360" stroke="#5a7d5a" stroke-width="2.5"/>
	<circle cx="650" cy="1345" r="11" fill="#5b7fbb"/>
	<circle cx="640" cy="1355" r="8" fill="#7ba8d4"/>
	<circle cx="660" cy="1355" r="8" fill="#7ba8d4"/>
	<circle cx="640" cy="1335" r="8" fill="#6b9fc4"/>
	<circle cx="660" cy="1335" r="8" fill="#6b9fc4"/>
	<circle cx="650" cy="1325" r="7" fill="#8bb8de"/>
	<circle cx="650" cy="1340" r="4.5" fill="#ffd700"/>
  </g>

  <!-- Small scattered flowers -->
  <g opacity="0.9" filter="url(#softShadow)">
	<!-- Small purple flower -->
	<line x1="350" y1="1480" x2="350" y2="1400" stroke="#5a7d5a" stroke-width="1.5"/>
	<circle cx="350" cy="1390" r="8" fill="#7b5fb6"/>
	<circle cx="343" cy="1398" r="5" fill="#9b7fd4"/>
	<circle cx="357" cy="1398" r="5" fill="#9b7fd4"/>
	<circle cx="350" cy="1385" r="3" fill="#ffd700"/>
  </g>

  <g opacity="0.9" filter="url(#softShadow)">
	<!-- Small pink flower -->
	<line x1="1300" y1="1485" x2="1300" y2="1410" stroke="#5a7d5a" stroke-width="1.5"/>
	<circle cx="1300" cy="1398" r="8" fill="#d99bc5"/>
	<circle cx="1293" cy="1406" r="5" fill="#e8a8d4"/>
	<circle cx="1307" cy="1406" r="5" fill="#e8a8d4"/>
	<circle cx="1300" cy="1393" r="3" fill="#ffd700"/>
  </g>

  <!-- Forest undergrowth vines (far background) -->
  <g opacity="0.25" stroke="#5a7d5a" stroke-width="2" fill="none">
	<path d="M 0 800 Q 200 750 400 800 T 800 800 T 1200 800 T 1600 800"/>
	<path d="M 100 1000 Q 300 950 500 1000 T 900 1000 T 1300 1000 T 1600 1000"/>
  </g>

  <!-- Magical particle effects (fairy dust) -->
  <g opacity="0.5" fill="#ffff99">
	<circle cx="500" cy="700" r="2" opacity="0.7"/>
	<circle cx="750" cy="600" r="1.5" opacity="0.6"/>
	<circle cx="1000" cy="750" r="1.8" opacity="0.65"/>
	<circle cx="300" cy="900" r="1.2" opacity="0.5"/>
	<circle cx="1300" cy="850" r="1.6" opacity="0.6"/>
	<circle cx="650" cy="500" r="2" opacity="0.7"/>
	<circle cx="1100" cy="650" r="1.5" opacity="0.6"/>
  </g>

  <!-- Flying Fairies with complex animation paths -->
  <!-- Fairy 1 - Upper Left -->
  <g class="fairy1">
	<g>
	  <circle cx="300" cy="500" r="12" fill="#ffff99" class="glow"/>
	  <circle cx="300" cy="500" r="16" fill="url(#fairyGlow)" class="glow" style="animation-delay: 0.5s;"/>
	  <!-- Wings -->
	  <g class="wings" style="animation-delay: 0s;">
		<ellipse cx="285" cy="492" rx="9" ry="14" fill="#ffd700" opacity="0.35" transform="rotate(-35 285 492)"/>
		<ellipse cx="315" cy="492" rx="9" ry="14" fill="#ffd700" opacity="0.35" transform="rotate(35 315 492)"/>
	  </g>
	  <!-- Body detail -->
	  <circle cx="300" cy="502" r="3" fill="#ffeb3b"/>
	</g>
  </g>

  <!-- Fairy 2 - Upper Center -->
  <g class="fairy2">
	<g>
	  <circle cx="800" cy="400" r="11" fill="#ffff99" class="glow" style="animation-delay: 0.3s;"/>
	  <circle cx="800" cy="400" r="15" fill="url(#fairyGlow)" class="glow" style="animation-delay: 0.8s;"/>
	  <!-- Wings -->
	  <g class="wings" style="animation-delay: 0.1s;">
		<ellipse cx="787" cy="393" rx="8" ry="13" fill="#ffd700" opacity="0.35" transform="rotate(-35 787 393)"/>
		<ellipse cx="813" cy="393" rx="8" ry="13" fill="#ffd700" opacity="0.35" transform="rotate(35 813 393)"/>
	  </g>
	  <!-- Body detail -->
	  <circle cx="800" cy="408" r="2.5" fill="#ffeb3b"/>
	</g>
  </g>

  <!-- Fairy 3 - Upper Right -->
  <g class="fairy3">
	<g>
	  <circle cx="1250" cy="550" r="12" fill="#ffff99" class="glow" style="animation-delay: 0.6s;"/>
	  <circle cx="1250" cy="550" r="16" fill="url(#fairyGlow)" class="glow" style="animation-delay: 1s;"/>
	  <!-- Wings -->
	  <g class="wings" style="animation-delay: 0.2s;">
		<ellipse cx="1235" cy="542" rx="9" ry="14" fill="#ffd700" opacity="0.35" transform="rotate(-35 1235 542)"/>
		<ellipse cx="1265" cy="542" rx="9" ry="14" fill="#ffd700" opacity="0.35" transform="rotate(35 1265 542)"/>
	  </g>
	  <!-- Body detail -->
	  <circle cx="1250" cy="558" r="3" fill="#ffeb3b"/>
	</g>
  </g>

  <!-- Fairy 4 - Middle area -->
  <g class="fairy4">
	<g>
	  <circle cx="600" cy="900" r="10" fill="#ffff99" class="glow" style="animation-delay: 0.4s;"/>
	  <circle cx="600" cy="900" r="14" fill="url(#fairyGlow)" class="glow" style="animation-delay: 0.9s;"/>
	  <!-- Wings -->
	  <g class="wings" style="animation-delay: 0.15s;">
		<ellipse cx="588" cy="893" rx="7" ry="12" fill="#ffd700" opacity="0.35" transform="rotate(-35 588 893)"/>
		<ellipse cx="612" cy="893" rx="7" ry="12" fill="#ffd700" opacity="0.35" transform="rotate(35 612 893)"/>
	  </g>
	  <!-- Body detail -->
	  <circle cx="600" cy="907" r="2" fill="#ffeb3b"/>
	</g>
  </g>

  <!-- Additional atmospheric elements -->
  <g opacity="0.15">
	<rect width="1600" height="1600" fill="#2a4a3a"/>
  </g>
</svg>